[package]
name = "agent"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
attribution = { path = "../attribution" }
capture = { path = "../capture" }
clap = { version = "4.6.1", features = ["derive"] }
